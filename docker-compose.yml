version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nodetalk/backend:latest
    ports:
      - "8080:8080"
      - "9090:9090/udp"
    volumes:
      - ./backend/data:/app/data
      - ./backend/config.toml:/app/config.toml
    restart: unless-stopped

  frontend:
    build:
      context: ./client-web
      dockerfile: Dockerfile
    image: nodetalk/frontend:latest
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
